<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IB History Flashcard Game</title>

<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  font-family:Arial, sans-serif;
  min-height:100vh;
  background:radial-gradient(circle at top,#1e3a8a,#020617 70%);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.game{
  width:100%;
  max-width:950px;
  background:rgba(255,255,255,0.09);
  border:1px solid rgba(255,255,255,0.18);
  border-radius:28px;
  padding:28px;
  box-shadow:0 25px 70px rgba(0,0,0,0.5);
  backdrop-filter:blur(14px);
}

h1{
  text-align:center;
  font-size:2.4rem;
  margin-bottom:8px;
}

.subtitle{
  text-align:center;
  color:#cbd5e1;
  margin-bottom:20px;
}

.stats{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  margin-bottom:18px;
}

.stat{
  background:rgba(255,255,255,0.1);
  border-radius:14px;
  padding:12px;
  text-align:center;
  font-weight:bold;
}

.timer{
  color:#f87171;
}

.progress-wrap{
  height:14px;
  background:rgba(255,255,255,0.13);
  border-radius:999px;
  overflow:hidden;
  margin-bottom:24px;
}

.progress{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#38bdf8,#22c55e);
  transition:0.3s;
}

.flashcard{
  perspective:1000px;
  height:290px;
  margin-bottom:22px;
  cursor:pointer;
}

.card-inner{
  width:100%;
  height:100%;
  position:relative;
  transition:transform 0.7s;
  transform-style:preserve-3d;
}

.flashcard.flipped .card-inner{
  transform:rotateY(180deg);
}

.card-side{
  position:absolute;
  width:100%;
  height:100%;
  backface-visibility:hidden;
  border-radius:24px;
  padding:30px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  border:1px solid rgba(255,255,255,0.2);
  background:linear-gradient(145deg,rgba(255,255,255,0.16),rgba(255,255,255,0.05));
}

.card-back{
  transform:rotateY(180deg);
  background:linear-gradient(145deg,rgba(34,197,94,0.18),rgba(255,255,255,0.06));
}

.label{
  color:#93c5fd;
  letter-spacing:2px;
  text-transform:uppercase;
  margin-bottom:16px;
  font-size:0.85rem;
}

.question{
  font-size:1.9rem;
  font-weight:bold;
  line-height:1.35;
}

.answer{
  font-size:1.25rem;
  line-height:1.55;
  color:#dbeafe;
}

.options{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-bottom:18px;
}

.option{
  border:none;
  padding:16px;
  border-radius:16px;
  background:#1d4ed8;
  color:white;
  font-size:1rem;
  font-weight:bold;
  cursor:pointer;
  transition:0.2s;
  min-height:70px;
}

.option:hover{
  transform:translateY(-2px);
  background:#2563eb;
}

.option.correct{
  background:#16a34a;
}

.option.wrong{
  background:#dc2626;
}

.option.disabled{
  pointer-events:none;
  opacity:0.85;
}

.bottom-buttons{
  display:flex;
  justify-content:center;
  gap:12px;
  flex-wrap:wrap;
}

.small-btn{
  border:none;
  border-radius:14px;
  padding:13px 18px;
  color:white;
  font-weight:bold;
  cursor:pointer;
  background:#7c3aed;
}

.skip{
  background:#f59e0b;
}

.next{
  background:#16a34a;
}

.feedback{
  text-align:center;
  min-height:28px;
  font-size:1.1rem;
  font-weight:bold;
  margin-bottom:12px;
}

.end-screen{
  display:none;
  text-align:center;
  line-height:1.8;
}

.end-screen h2{
  font-size:2.5rem;
  margin-bottom:14px;
}

.review{
  margin-top:20px;
  text-align:left;
  max-height:300px;
  overflow:auto;
  background:rgba(255,255,255,0.08);
  border-radius:18px;
  padding:16px;
}

.review-item{
  border-bottom:1px solid rgba(255,255,255,0.15);
  padding:12px 0;
}

@media(max-width:700px){
  .stats{
    grid-template-columns:1fr 1fr;
  }

  .options{
    grid-template-columns:1fr;
  }

  .question{
    font-size:1.35rem;
  }

  .answer{
    font-size:1rem;
  }

  .flashcard{
    height:330px;
  }
}
</style>
</head>

<body>

<div class="game">
  <h1>IB History DP1</h1>
  <p class="subtitle">Click the card to flip it. Choose the correct answer. Every game is different.</p>

  <div class="stats">
    <div class="stat" id="scoreBox">Score: 0</div>
    <div class="stat" id="cardBox">Card: 1/59</div>
    <div class="stat timer" id="timer">10:00</div>
    <div class="stat" id="streakBox">Streak: 0</div>
  </div>

  <div class="progress-wrap">
    <div class="progress" id="progress"></div>
  </div>

  <div id="gameScreen">
    <div class="flashcard" id="flashcard" onclick="flipCard()">
      <div class="card-inner">
        <div class="card-side card-front">
          <div class="label">Question</div>
          <div class="question" id="question"></div>
        </div>

        <div class="card-side card-back">
          <div class="label">Answer</div>
          <div class="answer" id="answer"></div>
        </div>
      </div>
    </div>

    <div class="feedback" id="feedback"></div>

    <div class="options" id="options"></div>

    <div class="bottom-buttons">
      <button class="small-btn skip" onclick="skipQuestion()">Skip</button>
      <button class="small-btn next" onclick="nextQuestion()">Next</button>
      <button class="small-btn" onclick="restartGame()">Restart</button>
    </div>
  </div>

  <div class="end-screen" id="endScreen">
    <h2>Game Over</h2>
    <div id="finalScore"></div>
    <button class="small-btn" onclick="restartGame()">Play Again</button>
    <div class="review" id="reviewBox"></div>
  </div>
</div>

<script>
const flashcards = [
{question:"Why did Japan expand in the 1930s?",answer:"Japan lacked natural resources, faced economic problems after the Great Depression, had a growing population, and militarists believed Japan deserved dominance in Asia."},
{question:"What was the Mukden Incident (1931)?",answer:"Japanese soldiers blew up a railway in Manchuria and blamed China. Japan used this as an excuse to invade Manchuria."},
{question:"Why was Manchuria important to Japan?",answer:"It had coal, iron, industry, and land. Japan needed resources for expansion."},
{question:"What was Manchukuo?",answer:"A puppet state created by Japan in Manchuria in 1932 with Puyi as ruler."},
{question:"Why was the League of Nations weak in Manchuria?",answer:"The League reacted slowly, condemned Japan, but took no military action. Japan simply left the League in 1933."},
{question:"What was the Second Sino-Japanese War?",answer:"A full-scale war between Japan and China beginning in 1937 after the Marco Polo Bridge Incident."},
{question:"What happened during the Nanjing Massacre?",answer:"Japanese troops killed and raped civilians after capturing Nanjing in 1937. Around 200,000–300,000 people died."},
{question:"Why did Japan attack Pearl Harbor?",answer:"Japan wanted to weaken the US Pacific fleet after American sanctions and oil embargoes."},
{question:"Who was Akira Iriye?",answer:"A historian who argued Japan expanded due to economic pressure and fear of Western domination."},
{question:"Who was E.H. Norman?",answer:"A historian who believed Japanese militarism and nationalism caused aggression."},
{question:"Who was Mussolini?",answer:"Leader of Fascist Italy who came to power in 1922."},
{question:"Why did Mussolini expand Italy?",answer:"He wanted prestige, a new Roman Empire, and to distract Italians from domestic problems."},
{question:"What was the Corfu Incident (1923)?",answer:"Italy occupied Corfu after Italian officials were killed in Greece."},
{question:"Why did Italy invade Abyssinia (Ethiopia)?",answer:"To build an empire and revenge Italy’s defeat at Adowa in 1896."},
{question:"Why did the League fail in Abyssinia?",answer:"Sanctions were weak and Britain/France avoided strong action against Mussolini."},
{question:"What was the Hoare-Laval Pact?",answer:"A secret British-French plan to give much of Ethiopia to Italy."},
{question:"What was the Rome-Berlin Axis?",answer:"An alliance between Mussolini and Hitler formed in 1936."},
{question:"Who was Denis Mack Smith?",answer:"Historian who argued Mussolini was driven by prestige and opportunism."},
{question:"Who was Richard Bosworth?",answer:"Historian emphasizing propaganda and domestic politics in Mussolini’s expansion."},
{question:"What were Hitler’s main goals?",answer:"Destroy Versailles, unite Germans, expand territory, and destroy communism."},
{question:"What was rearmament?",answer:"Hitler rebuilding Germany’s military in violation of Versailles."},
{question:"Why was the Rhineland important?",answer:"Hitler remilitarized it in 1936 and Britain/France did nothing, encouraging him further."},
{question:"What was Anschluss?",answer:"Germany annexed Austria in 1938."},
{question:"What was the Munich Agreement?",answer:"Britain and France allowed Hitler to take the Sudetenland from Czechoslovakia in 1938."},
{question:"What was appeasement?",answer:"Britain and France giving in to Hitler’s demands to avoid war."},
{question:"Why did appeasement fail?",answer:"It encouraged Hitler and allowed Germany to grow stronger."},
{question:"What was the Nazi-Soviet Pact?",answer:"A 1939 non-aggression pact between Hitler and Stalin including secret plans to divide Poland."},
{question:"What happened on 1 September 1939?",answer:"Germany invaded Poland, beginning WWII."},
{question:"Who was A.J.P. Taylor?",answer:"Historian who argued Hitler was opportunistic rather than following a master plan."},
{question:"Who was Ian Kershaw?",answer:"Historian who argued Hitler’s ideology drove expansion."},
{question:"Who was Richard Evans?",answer:"Historian emphasizing Nazism and racial ideology as key causes of aggression."},
{question:"What were the long-term causes of WWII?",answer:"Versailles resentment, dictators, nationalism, militarism, economic instability, and League weakness."},
{question:"What were the short-term causes of WWII?",answer:"Abyssinia, Rhineland, Anschluss, Munich, Nazi-Soviet Pact, and invasion of Poland."},
{question:"Who fought in the Spanish Civil War?",answer:"Republicans vs Nationalists led by Franco."},
{question:"Who supported the Republicans?",answer:"The USSR and International Brigades."},
{question:"Who supported Franco?",answer:"Germany and Italy."},
{question:"What was Guernica?",answer:"A Spanish town bombed by German aircraft in 1937, symbolizing civilian suffering."},
{question:"What were the consequences of the Spanish Civil War?",answer:"Franco ruled Spain until 1975 and Germany tested weapons and tactics."},
{question:"Who was Paul Preston?",answer:"Historian focusing on brutality in the Spanish Civil War."},
{question:"Who was Hugh Thomas?",answer:"Historian known for detailed analysis of the Spanish Civil War."},
{question:"Who fought in the Chinese Civil War?",answer:"The CCP led by Mao Zedong vs the KMT led by Chiang Kai-shek."},
{question:"What was the Long March?",answer:"A retreat by the Chinese Communists (1934–35) that helped Mao become leader."},
{question:"Why did the CCP win the Chinese Civil War?",answer:"Peasant support, guerrilla warfare, KMT corruption, and strong leadership."},
{question:"What happened in 1949 in China?",answer:"Mao established the People’s Republic of China while the KMT fled to Taiwan."},
{question:"What were the main causes of WWI?",answer:"Militarism, Alliances, Imperialism, and Nationalism (MAIN)."},
{question:"Who was Franz Ferdinand?",answer:"Archduke assassinated in 1914, triggering WWI."},
{question:"What was trench warfare?",answer:"Static warfare with trenches, mud, disease, and stalemate."},
{question:"What was the Treaty of Versailles?",answer:"The 1919 treaty blaming Germany for WWI and imposing reparations and restrictions."},
{question:"Who was Fritz Fischer?",answer:"Historian arguing Germany was mainly responsible for WWI."},
{question:"Who was Christopher Clark?",answer:"Historian arguing multiple powers shared responsibility for WWI."},
{question:"What were key features of WWII?",answer:"Total war, genocide, strategic bombing, propaganda, and civilian targeting."},
{question:"What was the Holocaust?",answer:"The systematic murder of around 6 million Jews by Nazi Germany."},
{question:"What happened in Hiroshima and Nagasaki?",answer:"The US dropped atomic bombs in August 1945, leading to Japan’s surrender."},
{question:"What were the consequences of WWII?",answer:"Creation of the UN, Cold War, weakened Europe, rise of USA/USSR, and decolonization."},
{question:"What similarities existed between Hitler and Mussolini?",answer:"Both used dictatorship, nationalism, propaganda, and militarism."},
{question:"How was Hitler different from Mussolini?",answer:"Hitler was more ideological and racially driven."},
{question:"What similarities existed between German and Japanese expansion?",answer:"Economic motives, militarism, nationalism, and weak League response."},
{question:"What was different about Japanese expansion?",answer:"Japan focused mainly on Asia and resources."},
{question:"What was different about German expansion?",answer:"Germany focused on Europe and racial expansion."}
];

let cards = [];
let current = 0;
let score = 0;
let wrong = 0;
let skipped = 0;
let streak = 0;
let bestStreak = 0;
let timeLeft = 600;
let timerInterval;
let answered = false;
let missedQuestions = [];

const questionEl = document.getElementById("question");
const answerEl = document.getElementById("answer");
const optionsEl = document.getElementById("options");
const feedbackEl = document.getElementById("feedback");
const cardEl = document.getElementById("flashcard");

function shuffle(array){
  const copy = [...array];
  for(let i = copy.length - 1; i > 0; i--){
    const r = Math.floor(Math.random() * (i + 1));
    [copy[i], copy[r]] = [copy[r], copy[i]];
  }
  return copy;
}

function startGame(){
  cards = shuffle(flashcards);
  current = 0;
  score = 0;
  wrong = 0;
  skipped = 0;
  streak = 0;
  bestStreak = 0;
  timeLeft = 600;
  missedQuestions = [];

  document.getElementById("gameScreen").style.display = "block";
  document.getElementById("endScreen").style.display = "none";

  clearInterval(timerInterval);
  timerInterval = setInterval(updateTimer, 1000);

  loadQuestion();
}

function loadQuestion(){
  if(current >= cards.length){
    endGame();
    return;
  }

  answered = false;
  feedbackEl.textContent = "";
  cardEl.classList.remove("flipped");

  const card = cards[current];
  questionEl.textContent = card.question;
  answerEl.textContent = card.answer;

  makeOptions(card);
  updateStats();
}

function makeOptions(card){
  optionsEl.innerHTML = "";

  let wrongAnswers = flashcards
    .filter(c => c.answer !== card.answer)
    .map(c => c.answer);

  wrongAnswers = shuffle(wrongAnswers).slice(0,3);

  let options = shuffle([card.answer, ...wrongAnswers]);

  options.forEach(optionText => {
    const btn = document.createElement("button");
    btn.className = "option";
    btn.textContent = optionText;
    btn.onclick = () => chooseAnswer(btn, optionText, card.answer);
    optionsEl.appendChild(btn);
  });
}

function chooseAnswer(button, selected, correctAnswer){
  if(answered) return;

  answered = true;

  const buttons = document.querySelectorAll(".option");

  buttons.forEach(btn => {
    btn.classList.add("disabled");

    if(btn.textContent === correctAnswer){
      btn.classList.add("correct");
    }
  });

  cardEl.classList.add("flipped");

  if(selected === correctAnswer){
    button.classList.add("correct");
    feedbackEl.textContent = "Correct. Nice.";
    score++;
    streak++;
    if(streak > bestStreak) bestStreak = streak;
  } else {
    button.classList.add("wrong");
    feedbackEl.textContent = "Wrong. Look at the correct answer.";
    wrong++;
    streak = 0;
    missedQuestions.push(cards[current]);
  }

  updateStats();
}

function flipCard(){
  cardEl.classList.toggle("flipped");
}

function nextQuestion(){
  current++;
  loadQuestion();
}

function skipQuestion(){
  if(!answered){
    skipped++;
    streak = 0;
    missedQuestions.push(cards[current]);
  }

  current++;
  loadQuestion();
}

function updateStats(){
  document.getElementById("scoreBox").textContent = "Score: " + score;
  document.getElementById("cardBox").textContent = "Card: " + (current + 1) + "/" + cards.length;
  document.getElementById("streakBox").textContent = "Streak: " + streak;
  document.getElementById("progress").style.width = ((current / cards.length) * 100) + "%";
}

function updateTimer(){
  const min = Math.floor(timeLeft / 60);
  const sec = timeLeft % 60;

  document.getElementById("timer").textContent =
    min + ":" + sec.toString().padStart(2,"0");

  if(timeLeft <= 0){
    endGame();
  }

  timeLeft--;
}

function endGame(){
  clearInterval(timerInterval);

  document.getElementById("gameScreen").style.display = "none";
  document.getElementById("endScreen").style.display = "block";

  const attempted = score + wrong;
  const accuracy = attempted > 0 ? Math.round((score / attempted) * 100) : 0;

  document.getElementById("finalScore").innerHTML =
    "Correct: " + score + "<br>" +
    "Wrong: " + wrong + "<br>" +
    "Skipped: " + skipped + "<br>" +
    "Best streak: " + bestStreak + "<br>" +
    "Accuracy: " + accuracy + "%";

  const reviewBox = document.getElementById("reviewBox");

  if(missedQuestions.length === 0){
    reviewBox.innerHTML = "<h3>Perfect. No review needed.</h3>";
  } else {
    reviewBox.innerHTML =
      "<h3>Review these:</h3>" +
      missedQuestions.map(item => `
        <div class="review-item">
          <strong>${item.question}</strong><br>
          ${item.answer}
        </div>
      `).join("");
  }
}

function restartGame(){
  startGame();
}

startGame();
</script>

</body>
</html>
